site_name: artifacts-keyring-nofuss
site_description: No-fuss, pure-Python keyring backend for Azure DevOps Artifacts feeds
site_url: https://microsoft.github.io/artifacts-keyring-nofuss/
repo_url: https://github.com/microsoft/artifacts-keyring-nofuss
repo_name: microsoft/artifacts-keyring-nofuss

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Scenarios:
      - Local development: local-dev.md
      - pip & uv setup: pip-uv.md
      - GitHub Actions: github-actions.md
      - Docker builds: docker.md
      - GitHub Codespaces: codespaces.md
      - Managed identity & service principals: identity.md
      - Pre-minted tokens: ci-token.md
  - How it works: concepts.md
  - Reference: reference.md
