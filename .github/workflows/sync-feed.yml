name: Sync feed

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  id-token: write # OIDC federation
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: pypi-lockdown # optional: gate with environment protection rules
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Get Azure DevOps token via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Fetch bearer token
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # Installing with contributor auth triggers upstream fetches
      # for any versions not yet cached in the feed.
      # We use pip download with --platform/--python-version to cache
      # wheels for all supported OS/Python combinations from a single runner.
      - name: Sync packages to feed
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          echo "::add-mask::${FEED_URL}"
          echo "::add-mask::${FEED_URL#https://}"
          INDEX="https://PAT:${TOKEN}@${FEED_URL#https://}"
          FAILURES=0

          # Pure-python packages (platform-independent)
          pip download \
            --index-url "$INDEX" \
            --dest /tmp/sync --no-deps \
            keyring artifacts-keyring-nofuss

          # Platform-specific wheels for each OS × Python version
          for platform in \
            manylinux_2_17_x86_64 \
            macosx_11_0_arm64 \
            win_amd64; do
            for pyver in 310 311 312 313; do
              echo "--- Syncing $platform / cp$pyver ---"
              if ! pip download \
                --index-url "$INDEX" \
                --dest /tmp/sync \
                --platform "$platform" \
                --python-version "$pyver" \
                --only-binary :all: \
                uv keyring artifacts-keyring-nofuss 2>&1; then
                echo "::warning::Failed to sync for $platform / cp$pyver"
                FAILURES=$((FAILURES + 1))
              fi
            done
          done

          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::$FAILURES platform/version combinations failed to sync"
            exit 1
          fi
