name: Sync feed

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  id-token: write # OIDC federation
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: pypi-lockdown # optional: gate with environment protection rules
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Get Azure DevOps token via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Fetch bearer token
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # Installing with contributor auth triggers upstream fetches
      # for any versions not yet cached in the feed.
      - name: Sync packages to feed
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          pip install \
            --index-url "https://PAT:${TOKEN}@${FEED_URL#https://}" \
            --upgrade --dry-run --no-deps \
            uv keyring artifacts-keyring-nofuss
